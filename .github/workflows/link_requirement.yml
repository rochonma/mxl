name: Link Requirement Issue

on:
  issues:
    types: [opened, edited]

  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: number
        description: "Feature issue number to test with"

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  link-requirement:

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.type == 'Feature' ||
      github.event.issue.type.name == 'Feature'

    runs-on: ubuntu-latest

    env:
      DEFAULT_REQUIREMENTS_REPO: ${{ vars.DEFAULT_REQUIREMENTS_REPO || 'dmf-mxl/mxl-requirements' }}
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}

    steps:

      - name: DEBUG — dump complete event to file
              run: |
                echo '${{ toJson(github.event) }}' > event.json
                echo "=== DEBUG: event.json written ==="
                head -n 50 event.json

      ###########################################################################
      # 0. TOKEN INITIALISATION
      ###########################################################################
      - name: Determine token mode
        id: token_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=dispatch" >> "$GITHUB_OUTPUT"
          else
            echo "mode=real" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        if: ${{ steps.token_mode.outputs.mode == 'real' }}
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CROSS_REPO_ISSUE_ACCESS_APP_ID }}
          private-key: ${{ secrets.CROSS_REPO_ISSUE_ACCESS_PRIVATE_KEY }}
          owner: dmf-mxl

      - name: Export GH_TOKEN (real)
        if: ${{ steps.token_mode.outputs.mode == 'real' }}
        run: echo "GH_TOKEN=${{ steps.app_token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Export GH_TOKEN (dispatch)
        if: ${{ steps.token_mode.outputs.mode == 'dispatch' }}
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"

      - name: Verify GH_TOKEN
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: GH_TOKEN missing"
            exit 1
          fi
          echo "GH_TOKEN OK"


      ###########################################################################
      # 1. FETCH ISSUE TIMELINE — the *real* source of Issue Form content
      ###########################################################################
      - name: Fetch timeline
        id: fetch_timeline
        run: |
          echo "Fetching timeline for issue #${ISSUE_NUMBER}"

          # Timeline requires preview header
          TIMELINE=$(gh api \
            -H "Accept: application/vnd.github.mockingbird-preview+json" \
            "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/timeline" || echo "[]")

          echo "$TIMELINE" > timeline.json

          echo "--- Timeline snippet ---"
          head -c 500 timeline.json
          echo
          echo "------------------------"

          # Export to environment variable
          {
            echo "ISSUE_TIMELINE<<EOF"
            cat timeline.json
            echo "EOF"
          } >> "$GITHUB_ENV"


      ###########################################################################
      # 2. EXTRACT REQUIREMENT LINK FROM TIMELINE
      ###########################################################################
      - name: Extract requirement_link from timeline
        id: extract_raw
        run: |
          echo "=== Extracting from TIMELINE ==="

          # Look for any timeline item body containing "Requirement Link"
          FORM_BODY=$(echo "$ISSUE_TIMELINE" | jq -r \
            '.[] | select(.body != null) | .body' | tr -d '\u200B\u200C\u200D' )

          echo "--- First matching form body (200 chars) ---"
          echo "$FORM_BODY" | head -c 200
          echo
          echo "-------------------------------------------"

          # Sanitize and extract line after heading
          SANITISED=$(printf "%s\n" "$FORM_BODY" | sed 's/[^[:print:]\t]//g')

          REQ_LINE=$(
            printf "%s\n" "$SANITISED" |
            awk 'tolower($0) ~ /requirement[[:space:]]+link/ {getline; print}' |
            xargs
          )

          echo "Extracted requirement_link='$REQ_LINE'"

          echo "requirement_link=$REQ_LINE" >> "$GITHUB_OUTPUT"


      ###########################################################################
      # 3. GUARD REQUIREMENT LINK
      ###########################################################################
      - name: Guard requirement_link exists
        id: guard
        run: |
          LINK="${{ steps.extract_raw.outputs.requirement_link }}"
          if [ -z "$LINK" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Test mode: continue"
              echo "has=true" >> "$GITHUB_OUTPUT"
            else
              echo "Missing requirement link — skipping"
              echo "has=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Found requirement link: $LINK"
            echo "has=true" >> "$GITHUB_OUTPUT"


      ###########################################################################
      # 4. NORMALIZE requirement_link
      ###########################################################################
      - name: Normalize requirement_link
        if: ${{ steps.guard.outputs.has == 'true' }}
        id: extract
        env:
          RAW_LINK: ${{ steps.extract_raw.outputs.requirement_link }}
          DEFAULT: ${{ env.DEFAULT_REQUIREMENTS_REPO }}
        run: |
          LINK="$(echo "$RAW_LINK" | xargs)"
          OWNER_REPO=""
          ISSUE_NUM=""
          FULL_URL=""

          if [[ "$LINK" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[0-9]+$ ]]; then
            OWNER_REPO="${LINK%%#*}"
            ISSUE_NUM="${LINK##*#}"
          elif [[ "$LINK" =~ ^\#?[0-9]+$ ]]; then
            OWNER_REPO="$DEFAULT"
            ISSUE_NUM="${LINK#\#}"
          elif [[ "$LINK" =~ ^https?://github\.com/([^/]+)/([^/]+)/issues/([0-9]+) ]]; then
            OWNER_REPO="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
            ISSUE_NUM="${BASH_REMATCH[3]}"
          fi

          FULL_URL="https://github.com/${OWNER_REPO}/issues/${ISSUE_NUM}"

          echo "owner_repo=$OWNER_REPO"     >> "$GITHUB_OUTPUT"
          echo "issue_num=$ISSUE_NUM"      >> "$GITHUB_OUTPUT"
          echo "requirement_url=$FULL_URL" >> "$GITHUB_OUTPUT"


      ###########################################################################
      # 5. CREATE SUB-ISSUE LINK
      ###########################################################################
      - name: Link as sub-issue
        if: ${{ steps.extract.outputs.issue_num != '' }}
        env:
          PARENT_REPO: ${{ steps.extract.outputs.owner_repo }}
          PARENT_NUMBER: ${{ steps.extract.outputs.issue_num }}
          CHILD_REPO: ${{ github.repository }}
          CHILD_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          set -e

          PARENT_NODE=$(gh issue view "https://github.com/$PARENT_REPO/issues/$PARENT_NUMBER" \
            --json id --jq .id)
          CHILD_NODE=$(gh issue view "https://github.com/$CHILD_REPO/issues/$CHILD_NUMBER" \
            --json id --jq .id)

          gh api graphql \
            -H "GraphQL-Features: sub_issues" \
            -f query="
              mutation {
                addSubIssue(input: {
                  issueId: \"${PARENT_NODE}\",
                  subIssueId: \"${CHILD_NODE}\"
                }) {
                  issue { title }
                  subIssue { title }
                }
              }
            "


      ###########################################################################
      # 6. APPEND NORMALIZED URL TO ISSUE BODY
      ###########################################################################
      - name: Append requirement URL to issue body
        if: ${{ steps.extract.outputs.issue_num != '' }}
        env:
          REQUIRE_URL: ${{ steps.extract.outputs.requirement_url }}
          CHILD_REPO: ${{ github.repository }}
          CHILD_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          gh api "repos/$CHILD_REPO/issues/$CHILD_NUMBER" --jq .body > body_current.txt

          sed -e '/<!--mxl:requirement:start-->/,/<!--mxl:requirement:end-->/d' \
            body_current.txt > body_clean.txt

          printf "\n\n<!--mxl:requirement:start-->\n%s\n<!--mxl:requirement:end-->\n" \
            "$REQUIRE_URL" >> body_clean.txt

          NEW_BODY="$(cat body_clean.txt)"

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/$CHILD_REPO/issues/$CHILD_NUMBER" \
            -f body="$NEW_BODY"


      ###########################################################################
      # 7. SUMMARY
      ###########################################################################
      - name: Final summary
        run: |
          echo "Issue Number:      ${{ env.ISSUE_NUMBER }}"
          echo "Owner Repo:        ${{ steps.extract.outputs.owner_repo }}"
          echo "Requirement Issue: ${{ steps.extract.outputs.issue_num }}"
          echo "Requirement URL:   ${{ steps.extract.outputs.requirement_url }}"
          echo "DONE."