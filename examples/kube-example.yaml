apiVersion: apps/v1
kind: Deployment
metadata:
  name: mxl-video-flow-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mxl-video-flow-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mxl-video-flow-writer
    spec:
      nodeSelector:
        kubernetes.io/hostname: __HOSTNAME__
      volumes:
        - name: domain
          persistentVolumeClaim:
            claimName: domain-pvc
        - name: flow-config
          configMap:
            name: mxl-video-flow-description
      containers:
        - name: test
          image: docker.io/library/mxl-example-video-flow-writer
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          volumeMounts:
            - name: domain
              mountPath: /home/mxl/domain
            - name: flow-config
              mountPath: /home/mxl/config
          args: ["-d", "domain", "-v", "config/flow.json"]
---
