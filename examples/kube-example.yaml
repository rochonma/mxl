apiVersion: v1
kind: PersistentVolume
metadata:
  name: domain-pv
spec:
  capacity:
    storage: 64M
  accessModes:
    - ReadWriteMany
  storageClassName: mxl-domain
  mountOptions:
    - strictatime
  local:
    path: /dev/shm/mxl/example/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [__HOSTNAME__] # !! CHANGEME
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: domain-pvc
spec:
  accessModes:
    - ReadWriteMany
  volumeName: domain-pv
  storageClassName: mxl-domain
  resources:
    requests:
      storage: 64M
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: domain-volume-lifecycle-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mxl-domain-lifecycle-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mxl-domain-lifecycle-controller
    spec:
      nodeSelector:
        kubernetes.io/hostname: __HOSTNAME__
      volumes:
        - name: run-dbus
          hostPath:
            path: /run/dbus
        - name: run-systemd
          hostPath:
            path: /run/systemd
        - name: dev-shm
          hostPath:
            path: /dev/shm
      initContainers:
        - name: create-volume
          securityContext:
            privileged: true
          env:
            - name: SYSTEMCTL_FORCE_BUS
              value: "1"
          volumeMounts:
            - name: run-dbus
              mountPath: /run/dbus
            - name: run-systemd
              mountPath: /run/systemd
            - name: dev-shm
              mountPath: /dev/shm
          image: docker.io/jonasohland/mxl-shminit:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              if [[ -d "/dev/shm/mxl/example" ]] \
                && grep -q "/dev/shm/mxl/example" /proc/mounts
              then
                echo "nothing to do"
                exit 0
              fi

              mkdir -vp "/dev/shm/mxl/example"
              echo "mounting tmpfs at /dev/shm/mxl/example"
              systemd-run -G --wait -q -- mount -t tmpfs -o size=64M,nosuid,nodev,noexec,strictatime tmpfs /dev/shm/mxl/example
              systemd-run -G --wait -q -- mkdir -v /dev/shm/mxl/example/data
              systemd-run -G --wait -q -- chown -R 1000:1000 /dev/shm/mxl/example/data
      containers:
        - name: wait
          securityContext:
            privileged: true
          env:
            - name: SYSTEMCTL_FORCE_BUS
              value: "1"
          volumeMounts:
            - name: run-dbus
              mountPath: /run/dbus
            - name: run-systemd
              mountPath: /run/systemd
            - name: dev-shm
              mountPath: /dev/shm
          image: docker.io/jonasohland/mxl-shminit:latest
          command:
            - /bin/bash
            - -c
            - |
              function teardown() {
                if grep -q "/dev/shm/mxl/example" /proc/mounts; then
                  echo "attempting to umount /dev/shm/mxl/example"
                  while true; do
                    if systemd-run -G --wait -q -- umount "/dev/shm/mxl/example"; then
                      echo "umount ok"
                      break
                    fi
                    sleep 0.5
                  done
                fi

                if systemd-run -G --wait -q -- /bin/sh -c "test -d /dev/shm/mxl/example"; then
                  echo "remove /dev/shm/mxl/example volume mountpoint"
                  systemd-run -G --wait -q -- rm -r /dev/shm/mxl/example
                fi

                exit 0
              }
              trap teardown SIGINT SIGTERM
              while true; do sleep 1; done
---
